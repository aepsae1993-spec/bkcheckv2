<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน</title>
    
    <!-- ปรับแต่ง CSS ให้ Iframe แสดงผลเต็มจอ 100% ไม่มีขอบ -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ป้องกันแถบ Scrollbar ซ้อนกัน */
            background-color: #f3f4f6; /* สีพื้นหลังกลืนกับระบบ */
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* ใส่ Loading Spinner เล็กๆ ระหว่างรอ Google โหลด */
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: -1; /* ให้อยู่หลัง iframe พอ iframe โหลดเสร็จจะบังอันนี้ไปเอง */
            font-family: 'Sarabun', sans-serif;
            color: #4b5563;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- อนิเมชั่นโหลด รอเว็บ Google -->
    <div class="loading-container">
        <div class="spinner"></div>
        <p>กำลังเชื่อมต่อระบบฐานข้อมูล...</p>
    </div>

    <!-- ดึงลิงก์ Google Apps Script ของคุณมาแสดง -->
    <iframe src="https://script.google.com/macros/s/AKfycbyE1kj_YOFJWBJeeH4M0EaF6iSuTBUaJPenlPuKphkwB-RtpWN7plcVtZeKoKi1A-Adcg/exec" allowfullscreen></iframe>

</body>
</html>
